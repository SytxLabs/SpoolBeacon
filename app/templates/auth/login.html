<!DOCTYPE html>
<html lang="{{ current_locale }}" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('auth.login.page_title') }} – {{ t('app.title') }}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'] },
                    colors: {
                        gray: {
                            750: '#323238', 800: '#27272a', 850: '#1e1e22',
                            900: '#141417', 950: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base { ::selection { background-color: #6366f1; color: #fff; } * { -webkit-font-smoothing: antialiased; } }
    </style>
</head>
<body class="h-full bg-gray-950 text-gray-100 font-sans flex items-center justify-center px-4">

<div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-indigo-500/15 border border-indigo-500/25 mb-4">
            <svg viewBox="0 0 20 20" fill="currentColor" class="w-6 h-6 text-indigo-400">
                <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm0-2a6 6 0 1 1 0-12 6 6 0 0 1 0 12Zm0-9a1 1 0 0 1 1 1v1h1a1 1 0 1 1 0 2h-1v1a1 1 0 1 1-2 0v-1H8a1 1 0 1 1 0-2h1V8a1 1 0 0 1 1-1Z" clip-rule="evenodd"/>
            </svg>
        </div>
        <h1 class="text-xl font-bold text-white tracking-tight">SpoolBeacon</h1>
        <p class="text-sm text-gray-500 mt-1">{{ t('auth.login.subtitle') }}</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="flex items-center gap-2.5 rounded-lg px-4 py-3 text-sm border mb-4
                {% if category == 'error' %}bg-red-950/60 border-red-900/60 text-red-300
                {% else %}bg-emerald-950/60 border-emerald-900/60 text-emerald-300{% endif %}">
        <svg viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 flex-shrink-0">
            <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/>
        </svg>
        {{ message }}
    </div>
    {% endfor %}
    {% endwith %}

    <!-- Login card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-800">
            <p class="text-sm font-medium text-gray-300">{{ t('auth.login.card_title') }}</p>
            <p class="text-xs text-gray-500 mt-0.5">{{ t('auth.login.card_subtitle') }}</p>
        </div>
        <form method="POST" class="px-6 py-5 space-y-4">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="username" class="block text-xs font-medium text-gray-400 mb-2">{{ t('auth.fields.username') }}</label>
                <input type="text" id="username" name="username" required autofocus
                       class="w-full bg-gray-850 border border-gray-750 rounded-lg px-3 py-2.5 text-sm text-white
                              placeholder-gray-600 focus:outline-none focus:border-indigo-500/60
                              focus:ring-2 focus:ring-indigo-500/15 transition-colors">
            </div>
            <div>
                <label for="password" class="block text-xs font-medium text-gray-400 mb-2">{{ t('auth.fields.password') }}</label>
                <input type="password" id="password" name="password" required
                       class="w-full bg-gray-850 border border-gray-750 rounded-lg px-3 py-2.5 text-sm text-white
                              placeholder-gray-600 focus:outline-none focus:border-indigo-500/60
                              focus:ring-2 focus:ring-indigo-500/15 transition-colors">
            </div>
            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm
                           rounded-lg px-4 py-2.5 transition-colors mt-1">
                {{ t('auth.login.submit_button') }}
            </button>
        </form>
    </div>

</div>
</body>
</html>
