<!DOCTYPE html>
<html lang="de" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SpoolBeacon</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full text-gray-100 bg-gray-950 flex items-center justify-center">

<div class="w-full max-w-sm">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-indigo-400">SpoolBeacon</h1>
        <p class="text-gray-500 text-sm mt-1">Filament-Inventory</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="rounded p-3 text-sm mb-4 {% if category == 'error' %}bg-red-900/50 border border-red-700 text-red-300{% else %}bg-green-900/50 border border-green-700 text-green-300{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
    {% endwith %}

    <form method="POST" class="bg-gray-900 border border-gray-800 rounded-lg p-6 space-y-4">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm text-gray-400 mb-1">Benutzername</label>
            <input type="text" name="username" required autofocus
                   class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Passwort</label>
            <input type="password" name="password" required
                   class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500">
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded px-4 py-2 text-sm font-medium transition-colors">
            Anmelden
        </button>
    </form>
</div>

</body>
</html>
