{% extends "base.html" %}
{% block title %}500 – {{ t('errors.500.title') }} – {{ t('app.title') }}{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">
    <p class="text-8xl font-bold text-gray-800 leading-none select-none">500</p>
    <p class="mt-4 text-lg font-semibold text-white">{{ t('errors.500.title') }}</p>
    <p class="mt-1 text-sm text-gray-500 max-w-sm">
        {{ t('errors.500.message') }}
    </p>
    <div class="mt-8 flex items-center gap-3">
        <a href="/dashboard" class="btn-primary">{{ t('errors.500.go_dashboard') }}</a>
        <a href="javascript:history.back()" class="btn-ghost">{{ t('errors.500.try_again') }}</a>
    </div>
</div>
{% endblock %}
